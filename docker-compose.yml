# ---------------------------------------------------------------------------
# OrionOps - Full Stack Development Environment
# ---------------------------------------------------------------------------
# Usage (cross-platform via pnpm — works on Windows, Linux, macOS):
#   pnpm docker:up      Tear down any running stack, then build and start all
#   pnpm docker:down    Stop all services (keep volumes)
#   pnpm docker:reset   Stop, wipe all data volumes, then rebuild from scratch
#
# Or with Docker directly (ensure nothing is running first):
#   docker compose down && docker compose up --build
# ---------------------------------------------------------------------------

include:
  - path: backend/docker-compose.yml

services:
  # --- Backend: Core API Service ---
  api:
    build:
      context: ./backend
      dockerfile: ./service-api/Dockerfile
    container_name: orionops-api
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVICE_PROFILE: cloud-api
      SPRING_PROFILES_ACTIVE: cloud,cloud-api
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orionops
      SPRING_DATASOURCE_USERNAME: orionops
      SPRING_DATASOURCE_PASSWORD: orionops_dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: orionops
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8081
      KEYCLOAK_REALM: orionops
      KEYCLOAK_CLIENT_ID: orionops-backend
      OPA_ENDPOINT: http://opa:8181
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Backend: Workflow Service (BPMN) ---
  workflow:
    build:
      context: ./backend
      dockerfile: ./service-workflow/Dockerfile
    container_name: orionops-workflow
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVICE_PROFILE: cloud-workflow
      SPRING_PROFILES_ACTIVE: cloud,cloud-workflow
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orionops_app
      SPRING_DATASOURCE_USERNAME: orionops
      SPRING_DATASOURCE_PASSWORD: orionops_dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8081
      KEYCLOAK_REALM: orionops
      KEYCLOAK_CLIENT_ID: orionops-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Backend: Worker Service (Event Processor) ---
  worker:
    build:
      context: ./backend
      dockerfile: ./service-worker/Dockerfile
    container_name: orionops-worker
    ports:
      - "8082:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVICE_PROFILE: cloud-worker
      SPRING_PROFILES_ACTIVE: cloud,cloud-worker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Backend: Notifier Service ---
  notifier:
    build:
      context: ./backend
      dockerfile: ./service-notifier/Dockerfile
    container_name: orionops-notifier
    ports:
      - "8083:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVICE_PROFILE: cloud-notifier
      SPRING_PROFILES_ACTIVE: cloud,cloud-notifier
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Backend: Connector Service ---
  connector:
    build:
      context: ./backend
      dockerfile: ./service-connector/Dockerfile
    container_name: orionops-connector
    ports:
      - "8084:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      SERVICE_PROFILE: cloud-connector
      SPRING_PROFILES_ACTIVE: cloud,cloud-connector
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Web Frontend (Next.js) ---------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: orionops-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
      NEXT_PUBLIC_KEYCLOAK_REALM: orionops
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: orionops-web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - orionops-net

  # --- AI Service (Python FastAPI) ----------------------------------------
  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: orionops-ai
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orionops-net
