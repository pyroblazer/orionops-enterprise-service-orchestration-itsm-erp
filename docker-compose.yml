# ---------------------------------------------------------------------------
# OrionOps - Full Stack Development Environment
# ---------------------------------------------------------------------------
# Usage:
#   make up                     Fresh start (down + build + up)
#   docker compose up --build   Build and start all services
#   docker compose down         Stop all services
#   docker compose down -v      Stop and delete all data volumes
# ---------------------------------------------------------------------------

include:
  - path: backend/docker-compose.yml

services:
  # --- Backend (Java Spring Boot) -----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orionops-backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: orionops
      KEYCLOAK_AUTH_SERVER_URL: http://host.docker.internal:8081
      KEYCLOAK_REALM: orionops
      KEYCLOAK_CLIENT_ID: orionops-backend
      OPA_ENDPOINT: http://opa:8181
      STRIPE_API_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - orionops-net

  # --- Web Frontend (Next.js) ---------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: orionops-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8081
      NEXT_PUBLIC_KEYCLOAK_REALM: orionops
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: orionops-web
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - orionops-net

  # --- AI Service (Python FastAPI) ----------------------------------------
  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: orionops-ai
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orionops-net
