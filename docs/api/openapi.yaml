          description: Updated
    delete:
      tags: [SLA]
      summary: Delete SLA definition
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /sla/apply:
    post:
      tags: [SLA]
      summary: Apply SLA to entity
      responses:
        '201':
          description: SLA instance created

  /sla/instances:
    get:
      tags: [SLA]
      summary: List SLA instances
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, at_risk, breached, paused, completed]
      responses:
        '200':
          description: SLA instances

  # ---- Knowledge ----
  /knowledge:
    get:
      tags: [Knowledge]
      summary: List knowledge articles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list
    post:
      tags: [Knowledge]
      summary: Create article
      responses:
        '201':
          description: Article created

  /knowledge/{id}:
    get:
      tags: [Knowledge]
      summary: Get article
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Article details
    put:
      tags: [Knowledge]
      summary: Update article
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Knowledge]
      summary: Delete article
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /knowledge/{id}/submit-for-review:
    patch:
      tags: [Knowledge]
      summary: Submit for review
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Submitted

  /knowledge/{id}/publish:
    patch:
      tags: [Knowledge]
      summary: Publish article
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Published

  # ---- Workflow ----
  /workflows/definitions:
    get:
      tags: [Workflow]
      summary: List workflow definitions
      responses:
        '200':
          description: Definition list
    post:
      tags: [Workflow]
      summary: Create workflow definition
      responses:
        '201':
          description: Definition created

  /workflows/definitions/{id}/start:
    post:
      tags: [Workflow]
      summary: Start workflow
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '201':
          description: Workflow started

  /workflows/instances/{id}/tasks:
    get:
      tags: [Workflow]
      summary: Get workflow tasks
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Task list

  /workflows/tasks/{taskId}/complete:
    post:
      tags: [Workflow]
      summary: Complete workflow task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task completed

  # ---- Finance ----
  /finance/cost-centers:
    get:
      tags: [Finance]
      summary: List cost centers
      responses:
        '200':
          description: Cost center list
    post:
      tags: [Finance]
      summary: Create cost center
      responses:
        '201':
          description: Created

  /finance/budgets:
    get:
      tags: [Finance]
      summary: List budgets
