  # ---- Audit ----
  /audit:
    get:
      tags: [Audit]
      summary: Query audit logs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: entityType
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated audit logs

  /audit/entity/{type}/{id}:
    get:
      tags: [Audit]
      summary: Get audit trail for entity
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entity audit trail

  # ---- Search ----
  /search:
    post:
      tags: [Search]
      summary: Global search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                types:
                  type: array
                  items:
                    type: string
                  description: Entity types to search
                page:
                  type: integer
                  default: 0
                size:
                  type: integer
                  default: 20
      responses:
        '200':
          description: Search results

  # ---- Integrations ----
  /integrations:
    get:
      tags: [Integrations]
      summary: List integration endpoints
      responses:
        '200':
          description: Integration list
    post:
      tags: [Integrations]
      summary: Create integration endpoint
      responses:
        '201':
          description: Created

  /integrations/{id}:
    get:
      tags: [Integrations]
      summary: Get integration
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Integration details
    put:
      tags: [Integrations]
      summary: Update integration
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Integrations]
      summary: Delete integration
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /integrations/{id}/test:
    post:
      tags: [Integrations]
      summary: Test integration endpoint
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Test result

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
      description: Page number (0-indexed)
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
      description: Page size
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        default: createdAt,desc
      description: Sort field and direction
    EntityIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Entity UUID

  schemas:
    ApiResponse_UserResponse_:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiResponse_PagedResponse_IncidentResponse__:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            content:
              type: array
              items: {}
            pageNumber:
              type: integer
            pageSize:
              type: integer
            totalElements:
              type: integer
            totalPages:
              type: integer
            last:
              type: boolean

    ApiResponse_IncidentResponse_:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string
        timestamp:
          type: string

    CreateIncidentRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
        priority:
          type: string
          enum: [critical, high, medium, low]
        impact:
          type: string
          enum: [high, medium, low]
        urgency:
          type: string
          enum: [high, medium, low]
        category:
          type: string
        subcategory:
          type: string
        serviceId:
          type: string
          format: uuid
        ciId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
        assignmentGroupId:
          type: string
          format: uuid

    UpdateIncidentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [critical, high, medium, low]
        impact:
          type: string
        urgency:
          type: string
        category:
          type: string
        subcategory:
          type: string
        serviceId:
          type: string
          format: uuid
        ciId:
          type: string
          format: uuid
        resolutionCode:
          type: string
        resolutionNotes:
          type: string

    ProblemRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        category:
          type: string
        serviceId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
