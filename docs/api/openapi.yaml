  # ---- Vendors ----
  /vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      responses:
        '200':
          description: Vendor list
    post:
      tags: [Vendors]
      summary: Create vendor
      responses:
        '201':
          description: Created

  /vendors/{id}:
    get:
      tags: [Vendors]
      summary: Get vendor
      parameters:
