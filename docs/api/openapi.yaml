  /cmdb/services:
    get:
      tags: [CMDB]
      summary: List services
      responses:
        '200':
          description: Service list
    post:
      tags: [CMDB]
      summary: Create service
      responses:
        '201':
          description: Service created

  /cmdb/services/{id}:
    get:
      tags: [CMDB]
      summary: Get service
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Service details
    put:
      tags: [CMDB]
      summary: Update service
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [CMDB]
      summary: Delete service
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  # ---- SLA ----
  /sla/definitions:
    get:
      tags: [SLA]
      summary: List SLA definitions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [SLA]
      summary: Create SLA definition
      responses:
        '201':
          description: Definition created

  /sla/definitions/{id}:
    get:
      tags: [SLA]
