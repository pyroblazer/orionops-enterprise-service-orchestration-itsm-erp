      tags: [Procurement]
      summary: List purchase requests
      responses:
        '200':
          description: Purchase request list
    post:
      tags: [Procurement]
      summary: Create purchase request
      responses:
        '201':
          description: Created

  /procurement/requests/{id}/submit:
    post:
      tags: [Procurement]
      summary: Submit purchase request
      parameters:
