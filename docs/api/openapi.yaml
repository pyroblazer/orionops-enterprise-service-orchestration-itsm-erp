openapi: 3.1.0
info:
  title: OrionOps API
  description: Enterprise Service Orchestration Platform - ITSM + ERP Extensions
  version: 1.0.0
  contact:
    name: OrionOps Team
servers:
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and user management
  - name: Incidents
    description: Incident management
  - name: Problems
    description: Problem management
  - name: Changes
    description: Change management
  - name: Requests
    description: Service request management
  - name: CMDB
    description: Configuration management database
  - name: SLA
    description: SLA definitions and instances
  - name: Knowledge
    description: Knowledge base articles
  - name: Workflow
    description: BPMN workflow management
  - name: Finance
    description: Financial management
  - name: Procurement
    description: Procurement management
  - name: Inventory
    description: Inventory and asset management
  - name: Vendors
    description: Vendor management
  - name: Workforce
    description: Workforce and HR operations
  - name: Billing
    description: Service billing and chargeback
  - name: Notifications
    description: Notification management
  - name: Audit
    description: Audit log queries
  - name: Search
    description: Global search
  - name: Integrations
    description: Webhook and integration management

paths:
  # ---- Auth ----
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserResponse_'

  /auth/sync-user:
    post:
      tags: [Auth]
      summary: Sync user from Keycloak
      operationId: syncUser
      responses:
        '200':
          description: User synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_UserResponse_'

  # ---- Incidents ----
  /incidents:
    get:
      tags: [Incidents]
      summary: List incidents
      operationId: listIncidents
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, closed, cancelled]
        - name: priority
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of incidents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_PagedResponse_IncidentResponse__'
    post:
      tags: [Incidents]
      summary: Create incident
      operationId: createIncident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncidentRequest'
      responses:
        '201':
          description: Incident created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_IncidentResponse_'

  /incidents/{id}:
    get:
      tags: [Incidents]
      summary: Get incident by ID
      operationId: getIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident details
    put:
      tags: [Incidents]
      summary: Update incident
      operationId: updateIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIncidentRequest'
      responses:
        '200':
          description: Incident updated
    delete:
      tags: [Incidents]
      summary: Soft delete incident
      operationId: deleteIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Incident deleted

  /incidents/{id}/assign:
    patch:
      tags: [Incidents]
      summary: Assign incident
      operationId: assignIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident assigned

  /incidents/{id}/escalate:
    patch:
      tags: [Incidents]
      summary: Escalate incident
      operationId: escalateIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident escalated

  /incidents/{id}/resolve:
    patch:
      tags: [Incidents]
      summary: Resolve incident
      operationId: resolveIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident resolved

  /incidents/{id}/close:
    patch:
      tags: [Incidents]
      summary: Close incident
      operationId: closeIncident
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident closed

  # ---- Problems ----
  /problems:
    get:
      tags: [Problems]
      summary: List problems
      operationId: listProblems
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [Problems]
      summary: Create problem
      operationId: createProblem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProblemRequest'
      responses:
        '201':
          description: Problem created

  /problems/{id}:
    get:
      tags: [Problems]
      summary: Get problem
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Problem details
    put:
      tags: [Problems]
      summary: Update problem
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Problem updated
    delete:
      tags: [Problems]
      summary: Delete problem
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /problems/{id}/link-incident:
    patch:
      tags: [Problems]
      summary: Link incident to problem
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Incident linked

  /problems/{id}/root-cause:
    patch:
      tags: [Problems]
      summary: Set root cause
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Root cause set

  # ---- Changes ----
  /changes:
    get:
      tags: [Changes]
      summary: List change requests
      operationId: listChanges
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [Changes]
      summary: Create change request
      operationId: createChange
      responses:
        '201':
          description: Change created

  /changes/{id}:
    get:
      tags: [Changes]
      summary: Get change request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Change details
    put:
      tags: [Changes]
      summary: Update change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Changes]
      summary: Delete change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /changes/{id}/approve:
    patch:
      tags: [Changes]
      summary: Approve change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Change approved

  /changes/{id}/reject:
    patch:
      tags: [Changes]
      summary: Reject change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Change rejected

  /changes/{id}/implement:
    patch:
      tags: [Changes]
      summary: Implement change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Change implemented

  /changes/{id}/close:
    patch:
      tags: [Changes]
      summary: Close change
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Change closed

  # ---- Service Requests ----
  /requests:
    get:
      tags: [Requests]
      summary: List service requests
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Paginated list
    post:
      tags: [Requests]
      summary: Create service request
      responses:
        '201':
          description: Request created

  /requests/{id}:
    get:
      tags: [Requests]
      summary: Get service request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Request details
    put:
      tags: [Requests]
      summary: Update request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Requests]
      summary: Delete request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /requests/{id}/approve:
    patch:
      tags: [Requests]
      summary: Approve request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Approved

  /requests/{id}/fulfill:
    patch:
      tags: [Requests]
      summary: Fulfill request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Fulfilled

  /requests/{id}/close:
    patch:
      tags: [Requests]
      summary: Close request
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Closed

  # ---- CMDB ----
  /cmdb/configuration-items:
    get:
      tags: [CMDB]
      summary: List configuration items
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: ciType
          in: query
          schema:
            type: string
        - name: environment
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list
    post:
      tags: [CMDB]
      summary: Create configuration item
      responses:
        '201':
          description: CI created

  /cmdb/configuration-items/{id}:
    get:
      tags: [CMDB]
      summary: Get CI
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: CI details
    put:
      tags: [CMDB]
      summary: Update CI
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '200':
          description: Updated
    delete:
      tags: [CMDB]
      summary: Delete CI
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
      responses:
        '204':
          description: Deleted

  /cmdb/configuration-items/{id}/relationships:
    get:
      tags: [CMDB]
      summary: Get CI relationships
      parameters:
