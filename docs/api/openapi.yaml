  /workforce/employees/by-skills:
    get:
      tags: [Workforce]
      summary: Search employees by skills
      parameters:
        - name: skills
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Matching employees

  /workforce/skills:
    get:
      tags: [Workforce]
      summary: List skills
      responses:
        '200':
          description: Skill list
    post:
      tags: [Workforce]
      summary: Create skill
      responses:
        '201':
          description: Created

  /workforce/capacity:
    get:
      tags: [Workforce]
      summary: Get capacity overview
      responses:
        '200':
          description: Capacity data

  # ---- Billing ----
  /billing/usage:
    get:
      tags: [Billing]
      summary: List service usage
      responses:
        '200':
          description: Usage list

  /billing/record-usage:
    post:
      tags: [Billing]
      summary: Record service usage
      responses:
        '201':
          description: Usage recorded

  /billing/records:
    get:
      tags: [Billing]
      summary: List billing records
      responses:
        '200':
          description: Billing records

  /billing/generate-invoice:
    post:
      tags: [Billing]
