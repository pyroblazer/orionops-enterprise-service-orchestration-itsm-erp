name: Render Heartbeat

on:
  schedule:
    # Every 10 minutes to keep Render free tier services from spinning down (15-min timeout)
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  BACKEND_URL: https://orionops-enterprise-service.onrender.com
  KEYCLOAK_URL: https://orionops-keycloak.onrender.com

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    name: Keep Render Services Alive
    steps:
      - name: Ping API Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging API Service"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://orionops-api.onrender.com/api/actuator/health")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ API service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ API health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Ping Worker Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging Worker Service"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://orionops-worker.onrender.com/api/actuator/health")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ Worker service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ Worker health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Ping Workflow Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging Workflow Service"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://orionops-workflow.onrender.com/api/actuator/health")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ Workflow service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ Workflow health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Ping Notifier Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging Notifier Service"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://orionops-notifier.onrender.com/api/actuator/health")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ Notifier service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ Notifier health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Ping Connector Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging Connector Service"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://orionops-connector.onrender.com/api/actuator/health")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ Connector service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ Connector health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Ping Keycloak Service
        continue-on-error: true
        run: |
          echo "🔄 Pinging Keycloak Service: ${{ env.KEYCLOAK_URL }}"
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ env.KEYCLOAK_URL }}/health/ready")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
              echo "✅ Keycloak service is alive (attempt $i, status $STATUS)"
              break
            else
              echo "⚠️ Keycloak health check attempt $i failed (status $STATUS), retrying..."
              sleep 2
            fi
          done

      - name: Summary
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo "🎯 Render Services Heartbeat Completed"
          echo "═══════════════════════════════════════════════════════"
          echo "⏰ Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ API Service:       https://orionops-api.onrender.com"
          echo "✅ Worker Service:    https://orionops-worker.onrender.com"
          echo "✅ Workflow Service:  https://orionops-workflow.onrender.com"
          echo "✅ Notifier Service:  https://orionops-notifier.onrender.com"
          echo "✅ Connector Service: https://orionops-connector.onrender.com"
          echo "✅ Keycloak:          ${{ env.KEYCLOAK_URL }}"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "📌 Services pinged every 10 minutes to prevent Render"
          echo "   free tier 15-minute inactivity spin-down."
          echo "═══════════════════════════════════════════════════════"
