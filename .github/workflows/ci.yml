name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: 9.15.0

# ---------------------------------------------------------------------------
# Dependency graph (multi-module backend in parallel):
#
#  common-build ─────────────────────────────────────────────────────┐
#                                                                     ▼
#  backend-api-tests                                                ─┐
#  backend-worker-tests                                             ─┤
#  backend-workflow-tests                                           ─┤
#  backend-notifier-tests (unit only)                               ─┤
#  backend-connector-tests (unit only)                              ─┤
#                                                                   │
#  web-lint-typecheck ──► web-unit-tests   ─┐                      │
#                     ──► web-a11y-tests   ─┤                      │
#  web-build          ──► web-e2e-tests    ─┤ (matrix ×2)         │
#                                           │                      │
#  mobile-tests                            ─┤ ──────────────┐      │
#  ai-tests                                ─┤              │      │
#                                                           ▼      ▼
#                                                      ci-status (gate)
# ---------------------------------------------------------------------------
jobs:

  # =========================================================================
  # BACKEND COMMON - Build & Cache
  # =========================================================================
  common-build:
    name: Backend Common Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build all backend modules
        env:
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn clean install -DskipTests -B

      - name: Upload Maven repository (parent + common POMs and JARs)
        uses: actions/upload-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/
          retention-days: 1

  # =========================================================================
  # BACKEND API - Unit + Integration + Contract Tests
  # =========================================================================
  backend-api-tests:
    name: Service API Tests
    runs-on: ubuntu-latest
    needs: [common-build]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orionops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.7.1
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.7.1
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/

      - name: Run API tests (unit + integration + contract)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orionops_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: "6379"
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn verify -pl service-api -DskipTests=false -Dspring.profiles.active=test -B

      - name: Upload API test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: backend/service-api/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND WORKER - Unit + Integration Tests
  # =========================================================================
  backend-worker-tests:
    name: Service Worker Tests
    runs-on: ubuntu-latest
    needs: [common-build]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orionops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.7.1
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.7.1
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/

      - name: Run worker tests (unit + integration)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orionops_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn verify -pl service-worker -DskipTests=false -Dspring.profiles.active=test -B

      - name: Upload worker test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: worker-test-results
          path: backend/service-worker/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND WORKFLOW - Unit + Workflow Simulation Tests
  # =========================================================================
  backend-workflow-tests:
    name: Service Workflow Tests
    runs-on: ubuntu-latest
    needs: [common-build]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orionops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/

      - name: Run workflow tests (unit + simulation)
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orionops_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn verify -pl service-workflow -DskipTests=false -Dspring.profiles.active=test -B

      - name: Upload workflow test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: workflow-test-results
          path: backend/service-workflow/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND NOTIFIER - Unit Tests Only
  # =========================================================================
  backend-notifier-tests:
    name: Service Notifier Tests
    runs-on: ubuntu-latest
    needs: [common-build]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/

      - name: Run notifier unit tests
        env:
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn test -pl service-notifier -B -Dtest.excludedGroups=docker -Dspring.profiles.active=test

      - name: Upload notifier test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: notifier-test-results
          path: backend/service-notifier/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND CONNECTOR - Unit Tests Only
  # =========================================================================
  backend-connector-tests:
    name: Service Connector Tests
    runs-on: ubuntu-latest
    needs: [common-build]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: backend-m2-repo
          path: ~/.m2/repository/com/orionops/

      - name: Run connector unit tests
        env:
          MAVEN_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=200m -XX:+UseG1GC"
        run: |
          mvn test -pl service-connector -B -Dtest.excludedGroups=docker -Dspring.profiles.active=test

      - name: Upload connector test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: connector-test-results
          path: backend/service-connector/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # WEB - Lint & Type Check  (fast, no build needed — unblocks unit+a11y)
  # =========================================================================
  web-lint-typecheck:
    name: Web Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @orionops/web lint

      - name: Type check
        run: pnpm --filter @orionops/web exec tsc --noEmit

  # =========================================================================
  # WEB - Build  (runs in parallel with lint-typecheck; artifact for E2E)
  # =========================================================================
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @orionops/web build

      - name: Upload build artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next/
          retention-days: 1

  # =========================================================================
  # WEB - Unit & Component Tests  (needs lint-typecheck, NOT full build)
  # =========================================================================
  web-unit-tests:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    needs: [web-lint-typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter @orionops/web test -- --coverage --ci --reporters=default

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  # =========================================================================
  # WEB - Accessibility Tests  (needs lint-typecheck, NOT full build)
  # =========================================================================
  web-a11y-tests:
    name: Web Accessibility Tests
    runs-on: ubuntu-latest
    needs: [web-lint-typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run accessibility tests
        run: pnpm --filter @orionops/web test:a11y -- --ci

  # =========================================================================
  # WEB - E2E Tests (Playwright)  (matrix ×2 shards, chromium only, fail-fast: false)
  # =========================================================================
  web-e2e-tests:
    name: Web E2E Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [web-build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: apps/web/.next/

      - name: Build if artifact missing
        run: |
          if [ ! -f apps/web/.next/BUILD_ID ]; then
            echo "Artifact missing — building inline"
            pnpm --filter @orionops/web build
          fi

      - name: Install Playwright (chromium only)
        run: pnpm --filter @orionops/web exec playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: pnpm --filter @orionops/web exec playwright test --config=e2e/playwright.config.ts --shard=${{ matrix.shard }}/2 --project=chromium

      - name: Upload Playwright report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7

  # =========================================================================
  # MOBILE - Typecheck & Tests  (independent — no deps)
  # =========================================================================
  mobile-tests:
    name: Mobile Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @orionops/mobile exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @orionops/mobile test
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/
          retention-days: 7

  # =========================================================================
  # AI SERVICE - Lint & Tests  (independent — no deps)
  # =========================================================================
  ai-tests:
    name: AI Service Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov httpx

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: apps/ai/coverage.xml
          retention-days: 7

  # =========================================================================
  # CI STATUS GATE  (waits for all jobs; reports each result individually)
  # =========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - common-build
      - backend-api-tests
      - backend-worker-tests
      - backend-workflow-tests
      - backend-notifier-tests
      - backend-connector-tests
      - web-lint-typecheck
      - web-build
      - web-unit-tests
      - web-a11y-tests
      - web-e2e-tests
      - mobile-tests
      - ai-tests
    if: always()
    steps:
      - name: Report job results
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "=== CI Job Results ==="
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          echo ""
          failed=$(echo "$RESULTS" | jq -r '[.[] | select(.result == "failure" or .result == "cancelled")] | length')
          skipped=$(echo "$RESULTS" | jq -r '[.[] | select(.result == "skipped")] | length')
          if [ "$failed" -ne "0" ]; then
            echo "::error::$failed job(s) failed or were cancelled"
            exit 1
          fi
          if [ "$skipped" -ne "0" ]; then
            echo "::warning::$skipped job(s) were skipped"
          fi
          echo "All CI checks passed ✓"
