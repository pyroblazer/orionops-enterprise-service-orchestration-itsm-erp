name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  PNPM_VERSION: 9

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # =========================================================================
  # BACKEND - Compile
  # =========================================================================
  backend-compile:
    name: Backend Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -B -q

  # =========================================================================
  # BACKEND - Unit Tests
  # =========================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-compile
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn test -B -Dtest="!*IT,!*.workflow.*" -Dspring.profiles.active=test

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND - Integration Tests (with service containers)
  # =========================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-compile
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orionops_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.7.1
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.7.1
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orionops_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: "6379"
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: mvn verify -B -Dtest="*IT" -Dspring.profiles.active=test

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # BACKEND - Workflow Simulation Tests
  # =========================================================================
  backend-workflow-tests:
    name: Backend Workflow Tests
    runs-on: ubuntu-latest
    needs: backend-compile
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run workflow simulation tests
        run: mvn test -B -Dtest="*.workflow.*" -Dspring.profiles.active=test

      - name: Upload workflow test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-workflow-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # =========================================================================
  # WEB - Lint & Build
  # =========================================================================
  web-build:
    name: Web Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm --filter @orionops/web lint

      - name: Build
        run: pnpm --filter @orionops/web build

  # =========================================================================
  # WEB - Unit & Component Tests (Jest)
  # =========================================================================
  web-unit-tests:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter @orionops/web test -- --coverage --ci --reporters=default

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  # =========================================================================
  # WEB - Accessibility Tests (jest-axe)
  # =========================================================================
  web-a11y-tests:
    name: Web Accessibility Tests
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run accessibility tests
        run: pnpm --filter @orionops/web test:a11y -- --ci

  # =========================================================================
  # WEB - E2E Tests (Playwright)
  # =========================================================================
  web-e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm --filter @orionops/web test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/e2e/test-results/
          retention-days: 7

  # =========================================================================
  # MOBILE - Typecheck & Tests
  # =========================================================================
  mobile-tests:
    name: Mobile Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @orionops/mobile exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @orionops/mobile test
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage/
          retention-days: 7

  # =========================================================================
  # AI SERVICE - Lint & Tests
  # =========================================================================
  ai-tests:
    name: AI Service Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov httpx

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-coverage
          path: apps/ai/coverage.xml
          retention-days: 7

  # =========================================================================
  # CI STATUS GATE
  # =========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - backend-integration-tests
      - backend-workflow-tests
      - web-unit-tests
      - web-a11y-tests
      - web-e2e-tests
      - mobile-tests
      - ai-tests
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ toJson(needs) }}"
          echo "Job results:"
          echo "$results" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          failed=$(echo "$results" | jq -r '[.[] | select(.result == "failure")] | length')
          if [ "$failed" -ne "0" ]; then
            echo "::error::$failed job(s) failed"
            exit 1
          fi
          echo "All CI checks passed"
