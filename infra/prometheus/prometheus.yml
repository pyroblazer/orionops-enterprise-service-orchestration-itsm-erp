global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "orionops-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: "orionops-api"

  - job_name: "orionops-ai"
    static_configs:
      - targets: ["ai:8000"]
        labels:
          service: "orionops-ai"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "opensearch"
    static_configs:
      - targets: ["opensearch:9200"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
