apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: orionops
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/component: policy-engine
data:
  orionops.rego: |
    package orionops

    import future.keywords.if
    import future.keywords.in

    default allow := false

    # Allow admin role full access
    allow if {
        input.user.roles[_] == "admin"
    }

    # Allow read access for all authenticated users
    allow if {
        input.action == "read"
        input.user.id != ""
    }

    # Allow agents to update incident status
    allow if {
        input.action == "update"
        input.resource.type == "incident"
        "agent" in input.user.roles
    }

    # Deny delete for non-admin
    deny if {
        input.action == "delete"
        not "admin" in input.user.roles
    }

    # Tenant isolation: users can only access their own tenant's resources
    allow if {
        input.resource.tenant_id == input.user.tenant_id
        input.action in ["read", "create", "update"]
        input.user.id != ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: orionops
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/component: policy-engine
    app.kubernetes.io/part-of: orionops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
        app.kubernetes.io/component: policy-engine
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.62.0
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "/policies/orionops.rego"
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          volumeMounts:
            - name: opa-policy
              mountPath: /policies
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health?bundles=true
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health?bundles=true
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: opa-policy
          configMap:
            name: opa-policy
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: orionops
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/component: policy-engine
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  ports:
    - name: http
      port: 8181
      targetPort: http
      protocol: TCP
