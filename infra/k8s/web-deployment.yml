apiVersion: apps/v1
kind: Deployment
metadata:
  name: orionops-web
  namespace: orionops
  labels:
    app.kubernetes.io/name: orionops-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: orionops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orionops-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orionops-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: web
          image: orionops/web:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: API_URL
            - name: NEXT_PUBLIC_KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: KEYCLOAK_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: orionops-web
  namespace: orionops
  labels:
    app.kubernetes.io/name: orionops-web
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: orionops-web
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
