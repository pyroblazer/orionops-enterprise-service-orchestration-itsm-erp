apiVersion: apps/v1
kind: Deployment
metadata:
  name: orionops-backend
  namespace: orionops
  labels:
    app.kubernetes.io/name: orionops-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: orionops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orionops-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orionops-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: orionops/backend:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: DATABASE_URL
                  optional: false
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orionops-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orionops-db-credentials
                  key: password
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: REDIS_HOST
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KEYCLOAK_AUTH_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: orionops-config
                  key: KEYCLOAK_URL
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: orionops-backend
  namespace: orionops
  labels:
    app.kubernetes.io/name: orionops-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    matchLabels:
      app.kubernetes.io/name: orionops-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
