services:
  - type: web
    name: orionops-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      - key: JAVA_OPTS
        value: "-Xmx384m -Xss256k"
      # Supabase PostgreSQL — set in Render dashboard
      # Format: jdbc:postgresql://db.<ref>.supabase.co:5432/postgres
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Upstash Redis — set in Render dashboard
      # Format: rediss://default:<password>@<host>:6380
      - key: SPRING_DATA_REDIS_URL
        sync: false
      # JWT signing secret — auto-generated by Render
      - key: JWT_SECRET
        generateValue: true
      # Vercel frontend URL for CORS — set after Vercel deploy
      # Format: https://<your-app>.vercel.app
      - key: FRONTEND_URL
        sync: false
