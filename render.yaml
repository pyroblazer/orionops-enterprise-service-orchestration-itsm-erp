services:
  # ── OrionOps Backend (Spring Boot) ──────────────────────────────────────
  - type: web
    name: orionops-enterprise-service
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      - key: JAVA_OPTS
        value: "-Xmx384m -Xss256k"
      # Neon PostgreSQL — URL and username are baked into the Docker image
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      # Set SPRING_DATASOURCE_PASSWORD in Render dashboard to your Neon password
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Upstash Redis — set in Render dashboard
      # Format: rediss://default:<password>@<host>:6380
      - key: SPRING_DATA_REDIS_URL
        sync: false
      # Vercel frontend URL for CORS
      - key: FRONTEND_URL
        sync: false
        value: https://orionops.vercel.app

  # ── OrionOps Keycloak (Identity Provider) ───────────────────────────────
  - type: web
    name: orionops-keycloak
    runtime: docker
    dockerfilePath: ./keycloak/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    envVars:
      # Keycloak admin credentials
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        generateValue: true
      # Neon PostgreSQL — URL and username are baked into the Docker image
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        sync: false
      - key: KC_DB_USERNAME
        sync: false
      # Set KC_DB_PASSWORD in Render dashboard to your Neon password
      - key: KC_DB_PASSWORD
        sync: false
      - key: KC_DB_SCHEMA
        value: keycloak
      # Hostname (Render service URL)
      - key: KC_HOSTNAME
        value: orionops-keycloak.onrender.com
      # Java memory (fit in free tier 512MB)
      - key: KC_JAVA_OPTS
        value: "-Xmx256m"
