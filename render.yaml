services:
  # ── OrionOps API (Core REST API) ──────────────────────────────────────────
  - type: web
    name: orionops-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SERVICE_PROFILE
        value: cloud-api
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-api"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-api.onrender.com/api/actuator/health"
      # Neon PostgreSQL
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://ep-patient-star-aozxgghu.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&options=endpoint%3Dep-patient-star-aozxgghu"
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      # Database and Auth secrets from environment group
      - key: SPRING_DATASOURCE_PASSWORD
        fromGroup: orionops-secrets
      - key: SPRING_DATA_REDIS_URL
        fromGroup: orionops-secrets
      - key: APP_AUTH_JWT_SECRET
        fromGroup: orionops-secrets
      # Vercel frontend URL for CORS
      - key: FRONTEND_URL
        value: https://orionops.vercel.app

  # ── OrionOps Workflow (Flowable BPMN Engine) ─────────────────────────────
