      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-workflow"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-workflow.onrender.com/api/actuator/health"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://ep-patient-star-aozxgghu.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&options=endpoint%3Dep-patient-star-aozxgghu"
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        fromGroup: orionops-secrets
      - key: SPRING_DATA_REDIS_URL
        fromGroup: orionops-secrets
      - key: APP_AUTH_JWT_SECRET
        fromGroup: orionops-secrets
      - key: FRONTEND_URL
        value: https://orionops.vercel.app

  # ── OrionOps Worker (Kafka Consumers + OpenSearch) ────────────────────────
  - type: web
