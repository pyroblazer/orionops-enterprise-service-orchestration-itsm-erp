services:
  # ── OrionOps API (Core REST API) ──────────────────────────────────────────
  - type: web
    name: orionops-api
    runtime: docker
    dockerfilePath: ./backend/service-api/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - fromGroup: shared-db
      - key: SERVICE_PROFILE
        value: cloud-api
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-api"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-api.onrender.com/api/actuator/health"

  # ── OrionOps Workflow (Flowable BPMN Engine) ─────────────────────────────
  - type: web
    name: orionops-workflow
    runtime: docker
    dockerfilePath: ./backend/service-workflow/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - fromGroup: shared-db
      - key: SERVICE_PROFILE
        value: cloud-workflow
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-workflow"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-workflow.onrender.com/api/actuator/health"

  # ── OrionOps Worker (Kafka Consumers + OpenSearch) ────────────────────────
  - type: web
    name: orionops-worker
    runtime: docker
    dockerfilePath: ./backend/service-worker/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - fromGroup: shared-db
      - key: SERVICE_PROFILE
        value: cloud-worker
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-worker"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-worker.onrender.com/api/actuator/health"

  # ── OrionOps Notifier (Email, Slack, Teams, Webhooks) ───────────────────
  - type: web
    name: orionops-notifier
    runtime: docker
    dockerfilePath: ./backend/service-notifier/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - fromGroup: shared-db
      - key: SERVICE_PROFILE
        value: cloud-notifier
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-notifier"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-notifier.onrender.com/api/actuator/health"

  # ── OrionOps Connector (Outbound REST/SOAP) ──────────────────────────────
  - type: web
    name: orionops-connector
    runtime: docker
    dockerfilePath: ./backend/service-connector/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - fromGroup: shared-db
      - key: SERVICE_PROFILE
        value: cloud-connector
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: "cloud,cloud-connector"
      - key: RENDER_HEARTBEAT_URL
        value: "https://orionops-connector.onrender.com/api/actuator/health"

  # ── OrionOps Keycloak (Identity Provider) ─────────────────────────────────
  - type: web
    name: orionops-keycloak
    runtime: docker
    dockerfilePath: ./keycloak/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health/ready
    envVars:
      - fromGroup: shared-db
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        value: admin
      - key: KC_DB
        value: postgres
      - key: KC_DB_SCHEMA
        value: keycloak
      - key: KC_HOSTNAME
        value: orionops-keycloak.onrender.com
      - key: KC_JAVA_OPTS
        value: "-Xmx256m"
