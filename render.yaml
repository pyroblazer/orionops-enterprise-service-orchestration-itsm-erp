services:
  # ── OrionOps Backend (Spring Boot) ──────────────────────────────────────
  - type: web
    name: orionops-enterprise-service
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      - key: JAVA_OPTS
        value: "-Xmx384m -Xss256k"
      # Neon PostgreSQL (direct endpoint — pooler disabled on this compute)
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://ep-patient-star-aozxgghu.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Upstash Redis — set in Render dashboard
      # Format: rediss://default:<password>@<host>:6380
      - key: SPRING_DATA_REDIS_URL
        sync: false
      # Vercel frontend URL for CORS
      - key: FRONTEND_URL
        value: https://orionops.vercel.app
      # JWT secret for local (non-Keycloak) authentication
      - key: APP_AUTH_JWT_SECRET
        value: "orionops-cloud-jwt-secret-key-2024-prod"

  # ── OrionOps Keycloak (Identity Provider) ───────────────────────────────
  - type: web
    name: orionops-keycloak
    runtime: docker
    dockerfilePath: ./keycloak/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health/ready
    envVars:
      # Keycloak admin credentials
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        generateValue: true
      # Neon PostgreSQL (direct endpoint — pooler disabled on this compute)
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: "jdbc:postgresql://ep-patient-star-aozxgghu.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        sync: false
      - key: KC_DB_SCHEMA
        value: keycloak
      # Hostname (Render service URL)
      - key: KC_HOSTNAME
        value: orionops-keycloak.onrender.com
      # Java memory (fit in free tier 512MB)
      - key: KC_JAVA_OPTS
        value: "-Xmx256m"
