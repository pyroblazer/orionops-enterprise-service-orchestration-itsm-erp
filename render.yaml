  # ── OrionOps Connector (Outbound REST/SOAP) ──────────────────────────────
  - type: web
    name: orionops-connector
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE_PROFILE: cloud-connector
