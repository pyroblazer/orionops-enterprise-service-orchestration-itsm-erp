      - key: FRONTEND_URL
        value: https://orionops.vercel.app

  # ── OrionOps Keycloak (Identity Provider) ─────────────────────────────────
  - type: web
    name: orionops-keycloak
    runtime: docker
    dockerfilePath: ./keycloak/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health/ready
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        fromGroup: orionops-secrets
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: "jdbc:postgresql://ep-patient-star-aozxgghu.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&options=endpoint%3Dep-patient-star-aozxgghu"
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        fromGroup: orionops-secrets
      - key: KC_DB_SCHEMA
        value: keycloak
      - key: KC_HOSTNAME
        value: orionops-keycloak.onrender.com
      - key: KC_JAVA_OPTS
        value: "-Xmx256m"
