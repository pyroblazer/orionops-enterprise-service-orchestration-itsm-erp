version: '3.9'
services:
  backend:
    image: orionops-backend:latest
    container_name: orionops-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ""
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orionops
      SPRING_DATASOURCE_USERNAME: orionops
      SPRING_DATASOURCE_PASSWORD: orionops_dev
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
    networks:
      - orionops-net
    depends_on:
      - postgres
      - redis
