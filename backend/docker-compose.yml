# ---------------------------------------------------------------------------
# OrionOps Backend - Development Infrastructure Stack
# ---------------------------------------------------------------------------
# Usage:  docker compose up -d
# Teardown: docker compose down -v
# ---------------------------------------------------------------------------

services:
  # --- PostgreSQL 16 --------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: orionops-postgres
    environment:
      POSTGRES_DB: orionops
      POSTGRES_USER: orionops
      POSTGRES_PASSWORD: orionops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orionops -d orionops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orionops-net

  # --- Redis 7 --------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: orionops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orionops-net

  # --- Zookeeper ------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: orionops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - orionops-net

  # --- Kafka 7 --------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: orionops-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - orionops-net

  # --- OpenSearch 2 ---------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: orionops-opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - orionops-net

  # --- MinIO ----------------------------------------------------------------
  minio:
    image: minio/minio
    container_name: orionops-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orionops-net

  # --- Keycloak 24 ----------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: orionops-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/orionops
      KC_DB_USERNAME: orionops
      KC_DB_PASSWORD: orionops_dev
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - ./src/main/resources/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8081 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - orionops-net

  # --- OPA (Open Policy Agent) ----------------------------------------------
  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: orionops-opa
    command: run --server --addr=0.0.0.0:8181 /policies
    ports:
      - "8181:8181"
    volumes:
      - ../infra/opa/policies:/policies
    networks:
      - orionops-net

  # --- Kafka Topic Init -----------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: orionops-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orionops.incident.events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orionops.change_request.events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orionops.sla_instance.events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orionops.billing_record.events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orionops.service_usage.events --partitions 3 --replication-factor 1
        echo "Kafka topics created."
    networks:
      - orionops-net

  # --- MinIO Bucket Init ----------------------------------------------------
  minio-init:
    image: minio/mc
    container_name: orionops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set orionops http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing orionops/orionops
        echo "MinIO bucket created."
    networks:
      - orionops-net
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  opensearch_data:
    driver: local
  minio_data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  orionops-net:
    driver: bridge
    name: orionops-network
