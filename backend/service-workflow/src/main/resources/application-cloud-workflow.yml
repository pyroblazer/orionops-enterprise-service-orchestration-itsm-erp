# ---------------------------------------------------------------------------
# Cloud Workflow profile — Flowable BPMN engine only
# Activated via: SPRING_PROFILES_ACTIVE=cloud,cloud-workflow
# ---------------------------------------------------------------------------

spring:
  kafka:
    enabled: true

flowable:
  enabled: true
  database-schema-update: true
  async-executor-activate: true
  async-executor-core-pool-size: 1
  async-executor-max-pool-size: 2
  async-executor-queue-size: 20

opensearch:
  enabled: false

minio:
  enabled: false

orionops:
  connector:
    enabled: false
  email:
    enabled: false
  chat:
    enabled: false
  webhook:
    enabled: false
  monitoring:
    enabled: false
  entra:
    enabled: false
  consumer:
    incident:
      enabled: false
    change:
      enabled: false
    sla:
      enabled: false
  notification:
    enabled: false
  search:
    enabled: false
  render:
    heartbeat:
      enabled: true
      url: ${RENDER_HEARTBEAT_URL:}
      interval: 840000
